name: Discover open product jobs

on:
  schedule:
    # Every day at 06:00 UTC (10:00 in Dubai)
    - cron: '0 6 * * *'
  workflow_dispatch:  # also allow manual trigger

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Run discovery
        run: python scripts/discover_jobs.py

      - name: Regenerate index.html if data changed
        run: python build_page.py

      - name: Commit + push if changed
        run: |
          if ! git diff --quiet open_roles.json index.html; then
            git config user.name "Evgeny Referral Bot"
            git config user.email "bot@users.noreply.github.com"
            git add open_roles.json index.html
            git commit -m "🤖 Auto-update open_roles.json from scheduled discovery"
            git push
          else
            echo "No role changes detected."
          fi

<!-- @dsCard group="Colors" viewport="700x170" name="Iridescent range" subtitle="Signature pastel hues from the mesh" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:20px;font-family:var(--font-sans)}
  .row{display:flex;gap:8px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:70px;border-radius:var(--radius-md)}
  .n{font-size:11px;font-weight:600;color:var(--text-primary)}
  .v{font-size:10px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--iris-blue)"></div><span class="n">blue</span><span class="v">#9ca6fd</span></div>
  <div class="sw"><div class="chip" style="background:var(--iris-periwinkle)"></div><span class="n">periwinkle</span><span class="v">#a6a8fd</span></div>
  <div class="sw"><div class="chip" style="background:var(--iris-lavender)"></div><span class="n">lavender</span><span class="v">#c7b8fa</span></div>
  <div class="sw"><div class="chip" style="background:var(--iris-violet)"></div><span class="n">violet</span><span class="v">#d7ccfd</span></div>
  <div class="sw"><div class="chip" style="background:var(--iris-mauve)"></div><span class="n">mauve</span><span class="v">#ddabdf</span></div>
  <div class="sw"><div class="chip" style="background:var(--iris-rose)"></div><span class="n">rose</span><span class="v">#f2a9ac</span></div>
  <div class="sw"><div class="chip" style="background:var(--iris-coral)"></div><span class="n">coral</span><span class="v">#f9a583</span></div>
  <div class="sw"><div class="chip" style="background:var(--iris-peach)"></div><span class="n">peach</span><span class="v">#fba477</span></div>
</div>
</body></html>

<!-- @dsCard group="Type" viewport="700x220" name="Display scale" subtitle="Onest · marketing headlines" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:24px;font-family:var(--font-display)}
  .line{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--border-subtle);padding:8px 0}
  .line:last-child{border:none}
  .tag{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:120px;flex-shrink:0}
  .d1{font-size:56px;font-weight:600;letter-spacing:-0.03em;line-height:1}
  .d2{font-size:40px;font-weight:600;letter-spacing:-0.025em;line-height:1}
  .d3{font-size:30px;font-weight:600;letter-spacing:-0.02em;line-height:1}
</style></head><body>
  <div class="line"><span class="tag">display-xl</span><span class="d1">The future of finance</span></div>
  <div class="line"><span class="tag">display-lg</span><span class="d2">Smarter journeys</span></div>
  <div class="line"><span class="tag">display-md</span><span class="d3">Ask. Act. Done.</span></div>
</body></html>

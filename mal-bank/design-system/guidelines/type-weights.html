<!-- @dsCard group="Type" viewport="700x150" name="Weights & tabular numerals" subtitle="Onest weights + money figures" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:24px;font-family:var(--font-sans)}
  .wrap{display:flex;gap:28px;align-items:center}
  .weights{display:flex;gap:22px;flex-wrap:wrap}
  .w{display:flex;flex-direction:column;gap:2px}
  .w b{font-size:28px}
  .w span{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
  .num{margin-left:auto;text-align:right;border-left:1px solid var(--border-subtle);padding-left:24px}
  .num .big{font-size:34px;font-weight:600;letter-spacing:-0.02em}
  .num .lbl{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="wrap">
  <div class="weights">
    <div class="w"><b style="font-weight:400">Aa</b><span>400 Regular</span></div>
    <div class="w"><b style="font-weight:500">Aa</b><span>500 Medium</span></div>
    <div class="w"><b style="font-weight:600">Aa</b><span>600 Semibold</span></div>
    <div class="w"><b style="font-weight:700">Aa</b><span>700 Bold</span></div>
  </div>
  <div class="num">
    <div class="big tnum">AED 12,480.50</div>
    <div class="lbl">tabular · tnum</div>
  </div>
</div>
</body></html>

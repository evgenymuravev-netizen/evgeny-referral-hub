<!-- @dsCard group="Brand" viewport="700x260" name="Signature gradient meshes" subtitle="Iridescent pastel — hero / cool / warm / veil" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:20px;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .mesh{position:relative;height:100px;border-radius:var(--radius-lg);overflow:hidden;display:flex;align-items:flex-end;padding:12px;border:1px solid var(--glass-border)}
  .lbl{position:relative;z-index:2;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-800)}
</style></head><body>
<div class="grid">
  <div class="mesh mal-grain" style="background:var(--mesh-hero)"><span class="lbl">hero</span></div>
  <div class="mesh mal-grain" style="background:var(--mesh-cool)"><span class="lbl">cool</span></div>
  <div class="mesh mal-grain" style="background:var(--mesh-warm)"><span class="lbl">warm</span></div>
  <div class="mesh mal-grain" style="background:var(--mesh-veil);background-color:var(--neutral-50)"><span class="lbl">veil</span></div>
</div>
</body></html>

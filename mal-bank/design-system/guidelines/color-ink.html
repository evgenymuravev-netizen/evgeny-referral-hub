<!-- @dsCard group="Colors" viewport="700x150" name="Ink scale" subtitle="Near-black foreground — text & icons" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:20px;font-family:var(--font-sans)}
  .row{display:flex;gap:10px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:64px;border-radius:var(--radius-md);border:1px solid var(--border-subtle)}
  .n{font-size:12px;font-weight:600;color:var(--text-primary)}
  .v{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><span class="n">ink-900</span><span class="v">#0e0e10</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><span class="n">ink-700</span><span class="v">#2a2a30</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><span class="n">ink-600</span><span class="v">#45454d</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><span class="n">ink-500</span><span class="v">#6a6a73</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><span class="n">ink-400</span><span class="v">#9a9aa2</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><span class="n">ink-300</span><span class="v">#c4c4cb</span></div>
</div>
</body></html>

<!-- @dsCard group="Brand" viewport="700x200" name="Wordmark & tagline" subtitle="No logo provided — set name in Onest" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:0;font-family:var(--font-display)}
  .wrap{position:relative;height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--mesh-hero);overflow:hidden}
  .mark{position:relative;z-index:2;font-size:64px;font-weight:600;letter-spacing:-0.04em;color:var(--ink-900)}
  .tag{position:relative;z-index:2;font-size:15px;color:var(--ink-700);font-family:var(--font-sans)}
  .note{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:10px;color:var(--ink-600);font-family:var(--font-mono);z-index:2}
</style></head><body>
<div class="wrap mal-grain">
  <div class="mark">Mal</div>
  <div class="tag">The future of finance is here.</div>
  <div class="note">No brand logo provided — wordmark set in Onest 600. Replace with official mark.</div>
</div>
</body></html>

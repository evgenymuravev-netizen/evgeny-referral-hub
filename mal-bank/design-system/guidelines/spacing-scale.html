<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>

  .bar{background:var(--iris-periwinkle);border-radius:4px;width:26px}
  .t{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
</style></head><body>
<div class="row">

  <div class="u"><div class="bar" style="height:40px"></div><span class="t">10·40</span></div>
  <div class="u"><div class="bar" style="height:48px"></div><span class="t">12·48</span></div>
  <div class="u"><div class="bar" style="height:64px"></div><span class="t">16·64</span></div>
  <div class="u"><div class="bar" style="height:80px"></div><span class="t">20·80</span></div>
</div>
</body></html>

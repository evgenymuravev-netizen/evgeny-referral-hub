<!-- @dsCard group="Spacing" viewport="700x170" name="Radii & shadows" subtitle="Generous rounding, light diffuse shadows" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);padding:24px;font-family:var(--font-sans)}
  .grid{display:flex;gap:16px}
  .col{flex:1}
  .h{font-size:11px;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:10px}
  .radrow,.shrow{display:flex;gap:12px}
  .rad{flex:1;height:52px;background:var(--iris-lavender);border:1px solid var(--border-default)}
  .rt{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-align:center;margin-top:5px}
  .sh{flex:1;height:52px;background:var(--surface-card);border-radius:var(--radius-md);border:1px solid var(--border-subtle)}
</style></head><body>
<div class="grid">
  <div class="col">
    <div class="h">Corner radii</div>
    <div class="radrow">
      <div><div class="rad" style="border-radius:var(--radius-sm)"></div><div class="rt">sm 10</div></div>
      <div><div class="rad" style="border-radius:var(--radius-md)"></div><div class="rt">md 14</div></div>
      <div><div class="rad" style="border-radius:var(--radius-lg)"></div><div class="rt">lg 20</div></div>
      <div><div class="rad" style="border-radius:var(--radius-xl)"></div><div class="rt">xl 28</div></div>
      <div><div class="rad" style="border-radius:var(--radius-pill)"></div><div class="rt">pill</div></div>
    </div>
  </div>
  <div class="col">
    <div class="h">Shadows</div>
    <div class="shrow">
      <div style="flex:1"><div class="sh" style="box-shadow:var(--shadow-xs)"></div><div class="rt">xs</div></div>
      <div style="flex:1"><div class="sh" style="box-shadow:var(--shadow-sm)"></div><div class="rt">sm</div></div>
      <div style="flex:1"><div class="sh" style="box-shadow:var(--shadow-md)"></div><div class="rt">md</div></div>
      <div style="flex:1"><div class="sh" style="box-shadow:var(--shadow-lg)"></div><div class="rt">lg</div></div>
      <div style="flex:1"><div class="sh" style="box-shadow:var(--shadow-glow)"></div><div class="rt">glow</div></div>
    </div>
  </div>
</div>
</body></html>

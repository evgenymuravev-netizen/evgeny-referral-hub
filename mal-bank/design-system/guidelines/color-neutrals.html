<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Surface & border grays" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:20px;font-family:var(--font-sans)}
  .row{display:flex;gap:10px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:64px;border-radius:var(--radius-md);border:1px solid var(--border-default)}
  .n{font-size:12px;font-weight:600;color:var(--text-primary)}
  .v{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--neutral-0)"></div><span class="n">neutral-0</span><span class="v">#ffffff</span></div>
  <div class="sw"><div class="chip" style="background:var(--neutral-50)"></div><span class="n">neutral-50</span><span class="v">#f7f7f9</span></div>
  <div class="sw"><div class="chip" style="background:var(--neutral-100)"></div><span class="n">neutral-100</span><span class="v">#f0f0f3</span></div>
  <div class="sw"><div class="chip" style="background:var(--neutral-150)"></div><span class="n">neutral-150</span><span class="v">#e8e8ed</span></div>
  <div class="sw"><div class="chip" style="background:var(--neutral-200)"></div><span class="n">neutral-200</span><span class="v">#dfdfe6</span></div>
  <div class="sw"><div class="chip" style="background:var(--neutral-300)"></div><span class="n">neutral-300</span><span class="v">#cbcbd4</span></div>
</div>
</body></html>

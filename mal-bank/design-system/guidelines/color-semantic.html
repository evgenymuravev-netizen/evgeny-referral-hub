<!-- @dsCard group="Colors" viewport="700x150" name="Tints & semantic status" subtitle="Soft fills + success / warning / danger / info" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:20px;font-family:var(--font-sans)}
  .row{display:flex;gap:10px}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px}
  .chip{height:46px;border-radius:var(--radius-sm);border:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
  .n{font-size:11px;font-weight:600;color:var(--text-primary)}
  .v{font-size:10px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="row" style="margin-bottom:12px">
  <div class="sw"><div class="chip" style="background:var(--tint-iris)"></div><span class="n">tint-iris</span></div>
  <div class="sw"><div class="chip" style="background:var(--tint-rose)"></div><span class="n">tint-rose</span></div>
  <div class="sw"><div class="chip" style="background:var(--tint-peach)"></div><span class="n">tint-peach</span></div>
  <div class="sw"><div class="chip" style="background:var(--tint-mint)"></div><span class="n">tint-mint</span></div>
</div>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--success-500);color:#fff">Success</div><span class="v">#1f8a5b</span></div>
  <div class="sw"><div class="chip" style="background:var(--warning-500);color:#fff">Warning</div><span class="v">#c8841f</span></div>
  <div class="sw"><div class="chip" style="background:var(--danger-500);color:#fff">Danger</div><span class="v">#d1483f</span></div>
  <div class="sw"><div class="chip" style="background:var(--info-500);color:#fff">Info</div><span class="v">#4a63d8</span></div>
</div>
</body></html>

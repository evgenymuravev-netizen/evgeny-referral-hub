<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style> body { margin: 0; background: var(--surface-page); padding: 24px; } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { AccountCard, TransactionRow, ChatBubble, Badge, Button, Icon } = window.MalDesignSystem_097b20;
function Demo() {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "300px 1fr", gap: 24, alignItems: "start" }}>
      <AccountCard label="Available balance" currency="AED" amount="12,480.50" cardLast4="4417" />
      <div>
        <div style={{ background: "var(--surface-card)", border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-lg)", padding: "6px 10px", marginBottom: 16 }}>
          <TransactionRow icon={<Icon name="credit-card" />} title="Careem" subtitle="Transport · Today"
            amount="42.00" direction="out" badge={<Badge tone="iris" size="sm">Halal</Badge>} />
          <TransactionRow icon={<Icon name="arrow-down-left" />} title="Salary" subtitle="ADCB · 1 Jul"
            amount="12,000.00" direction="in" />
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <ChatBubble from="user">Find a halal hotel in Istanbul under AED 600.</ChatBubble>
          <ChatBubble from="assistant" timestamp="Just now"
            actions={<Button size="sm" variant="secondary">Book now</Button>}>
            Found 3 — top pick is 540/night, refundable.
          </ChatBubble>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>

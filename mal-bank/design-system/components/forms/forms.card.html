<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 20px; align-items: start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Switch, Checkbox, Icon } = window.MalDesignSystem_097b20;
function Demo() {
  const [on, setOn] = React.useState(true);
  const [on2, setOn2] = React.useState(false);
  const [chk, setChk] = React.useState(true);
  return (
    <div className="grid">
      <Input label="Full name" placeholder="Layla Al Mansoori" iconLeft={<Icon name="user" size={18} />} />
      <Select label="Currency" options={["AED", "USD", "SAR"]} />
      <Input label="Email" placeholder="you@mal.ai" defaultValue="hello@mal.ai" />
      <Input label="Amount" defaultValue="99999" error="Insufficient balance" />
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <Switch checked={on} onChange={setOn} label="Round-up savings" />
        <Switch checked={on2} onChange={setOn2} label="Travel notifications" />
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <Checkbox checked={chk} onChange={setChk} label="Halal transactions only" />
        <Checkbox checked={false} onChange={() => {}} label="Share anonymous insights" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>

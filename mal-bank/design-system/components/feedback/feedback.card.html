<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px; }
  /* Render the dialog inline (not fixed) so it shows in the card */
  .inline-dialog > [role="dialog"] { position: relative !important; inset: auto !important; padding: 0 !important; background: transparent !important; backdrop-filter: none !important; }
  .col { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Dialog, Toast, Tooltip, Button, IconButton, Icon } = window.MalDesignSystem_097b20;
function Demo() {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1.1fr 1fr", gap: 24, alignItems: "start" }}>
      <div className="inline-dialog">
        <Dialog open onClose={() => {}} title="Confirm transfer"
          description="Send AED 250 to Layla Al Mansoori? This is a one-time transfer."
          footer={<>
            <Button variant="ghost" size="sm">Cancel</Button>
            <Button variant="primary" size="sm">Send</Button>
          </>} />
      </div>
      <div className="col">
        <Toast tone="success" title="Transfer sent" message="AED 250 to Layla" icon={<Icon name="check" size={18} />} onClose={() => {}} />
        <Toast tone="warning" title="Low balance" message="Below your AED 500 buffer" icon={<Icon name="alert-triangle" size={18} />} />
        <div style={{ display: "flex", gap: 14, alignItems: "center", paddingTop: 4 }}>
          <Tooltip label="Halal-verified" side="top"><IconButton aria-label="Info"><Icon name="shield-check" /></IconButton></Tooltip>
          <Tooltip label="Settings" side="right"><IconButton aria-label="Settings"><Icon name="settings" /></IconButton></Tooltip>
          <span style={{ fontSize: 13, color: "var(--text-muted)" }}>hover the icons →</span>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>

/* ---------- Design tokens — Mal Design System (mal.ai) ----------
   Ink on off-white, iridescent mesh as the signature asset, iris-blue accent.
   Onest across the board; Geist Mono for data/spec labels. */
:root {
  color-scheme: light;
  --ground:#f7f7f9; --panel:#ffffff; --ink:#0e0e10; --muted:#6a6a73;
  --accent:#4a63d8; --accent-strong:#3d55c9; --brass:#9a9aa2;
  --ok:#1f8a5b; --warn:#c8841f; --bad:#d1483f;
  --ok-soft:#e4f4ec; --warn-soft:#faf0dc; --bad-soft:#fbe9e7;
  --accent-soft:#e9ecfb; --tint-iris:#eeecff;
  --hairline:#dfdfe6; --hairline-soft:#e8e8ed;
  --grid:#f0f0f3; --axis:#c4c4cb;
  --c-approve:#1f8a5b; --c-refer:#c8841f; --c-decline:#d1483f;
  --s1:#4a63d8; --s2:#a6a8fd; --meter-track:#e8e8ed; --corridor:rgba(74,99,216,.08);
  --font-display:'Onest',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-ui:'Onest',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono:'Geist Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --font-ar:'Noto Naskh Arabic','Geeza Pro','Traditional Arabic',serif;
  --radius-sm:10px; --radius-md:14px; --radius:20px; --radius-lg:28px; --radius-pill:999px;
  --shadow-xs:0 1px 2px rgba(14,14,16,.05);
  --shadow:0 2px 8px rgba(14,14,16,.06);
  --shadow-md:0 8px 24px rgba(14,14,16,.08);
  --focus-ring:rgba(74,99,216,.35);
  --glass-fill:rgba(255,255,255,.6); --glass-border:rgba(255,255,255,.55);
  --iris-periwinkle:#a6a8fd; --iris-lavender:#c7b8fa; --iris-lilac:#d3c9fb;
  --iris-violet:#d7ccfd; --iris-rose:#f2a9ac; --iris-peach:#fba477;
  --mesh-hero:
    radial-gradient(60% 70% at 18% 22%, var(--iris-lilac) 0%, transparent 60%),
    radial-gradient(55% 65% at 80% 18%, var(--iris-periwinkle) 0%, transparent 58%),
    radial-gradient(70% 80% at 72% 82%, var(--iris-rose) 0%, transparent 60%),
    radial-gradient(60% 70% at 30% 88%, var(--iris-peach) 0%, transparent 58%),
    radial-gradient(90% 90% at 50% 50%, var(--iris-violet) 0%, var(--iris-lavender) 100%);
  --dur-fast:120ms; --dur-base:200ms; --ease-out:cubic-bezier(.16,1,.3,1);
}
@media (prefers-color-scheme: dark) {
  :root:where(:not([data-theme="light"])) {
    color-scheme: dark;
    --ground:#0e0e10; --panel:#1a1a1e; --ink:#f7f7f9; --muted:#9a9aa2;
    --accent:#a6a8fd; --accent-strong:#c7b8fa; --brass:#6a6a73;
    --ok:#4db995; --warn:#d9a662; --bad:#e57f74;
    --ok-soft:rgba(77,185,149,.15); --warn-soft:rgba(217,166,98,.14); --bad-soft:rgba(229,127,116,.14);
    --accent-soft:rgba(166,168,253,.16); --tint-iris:rgba(166,168,253,.18);
    --hairline:#2a2a30; --hairline-soft:#232326;
    --grid:#1f1f24; --axis:#45454d;
    --c-approve:#4db995; --c-refer:#d9a662; --c-decline:#e57f74;
    --s1:#a6a8fd; --s2:#c7b8fa; --meter-track:#2a2a30; --corridor:rgba(166,168,253,.10);
    --shadow-xs:0 1px 2px rgba(0,0,0,.3); --shadow:0 2px 8px rgba(0,0,0,.35); --shadow-md:0 8px 24px rgba(0,0,0,.4);
    --focus-ring:rgba(166,168,253,.45);
    --glass-fill:rgba(26,26,30,.6); --glass-border:rgba(255,255,255,.14);
  }
}
:root[data-theme="dark"] {
  color-scheme: dark;
  --ground:#0e0e10; --panel:#1a1a1e; --ink:#f7f7f9; --muted:#9a9aa2;
  --accent:#a6a8fd; --accent-strong:#c7b8fa; --brass:#6a6a73;
  --ok:#4db995; --warn:#d9a662; --bad:#e57f74;
  --ok-soft:rgba(77,185,149,.15); --warn-soft:rgba(217,166,98,.14); --bad-soft:rgba(229,127,116,.14);
  --accent-soft:rgba(166,168,253,.16); --tint-iris:rgba(166,168,253,.18);
  --hairline:#2a2a30; --hairline-soft:#232326;
  --grid:#1f1f24; --axis:#45454d;
  --c-approve:#4db995; --c-refer:#d9a662; --c-decline:#e57f74;
  --s1:#a6a8fd; --s2:#c7b8fa; --meter-track:#2a2a30; --corridor:rgba(166,168,253,.10);
  --shadow-xs:0 1px 2px rgba(0,0,0,.3); --shadow:0 2px 8px rgba(0,0,0,.35); --shadow-md:0 8px 24px rgba(0,0,0,.4);
  --focus-ring:rgba(166,168,253,.45);
  --glass-fill:rgba(26,26,30,.6); --glass-border:rgba(255,255,255,.14);
}

/* ---------- Base ---------- */
* { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body { background:var(--ground); color:var(--ink); font:14px/1.5 var(--font-ui);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
h1,h2,h3,h4 { margin:0; font-weight:600; letter-spacing:-.015em; }
p { margin:.4em 0; }
a { color:var(--accent); text-decoration:none; }
a:hover { color:var(--accent-strong); }
button { font:inherit; color:inherit; }
code, .mono { font-family:var(--font-mono); font-size:.9em; }
:focus-visible { outline:3px solid var(--focus-ring); outline-offset:1px; }
::selection { background:var(--tint-iris); }
.ar { font-family:var(--font-ar); direction:rtl; unicode-bidi:isolate; }
.num { font-family:var(--font-ui); font-variant-numeric:tabular-nums; font-feature-settings:"tnum" on; }
.muted { color:var(--muted); }
.small { font-size:12px; }
hr.rule { border:0; border-top:1px solid var(--hairline-soft); margin:14px 0; }

/* ---------- Fatal banner ---------- */
#fatal-banner { display:none; position:sticky; top:0; z-index:99; background:var(--bad); color:#fff;
  padding:10px 16px; font-family:var(--font-mono); font-size:12.5px; white-space:pre-wrap; }
#fatal-banner.show { display:block; }

/* ---------- Layout ---------- */
.app { display:flex; min-height:100vh; }
.sidebar { width:248px; flex:0 0 248px; background:var(--panel); border-right:1px solid var(--hairline-soft);
  display:flex; flex-direction:column; position:sticky; top:0; height:100vh; }
.wordmark { margin:12px; padding:18px 16px 14px; border-radius:var(--radius); background:var(--mesh-hero);
  background-size:cover; position:relative; overflow:hidden; }
.wordmark .wm-line { display:flex; align-items:baseline; gap:9px; position:relative; }
.wordmark .wm-en { font-family:var(--font-display); font-weight:600; font-size:25px; letter-spacing:-.03em; line-height:1; color:#0e0e10; }
.wordmark .wm-ar { font-family:var(--font-ar); font-size:18px; color:#0e0e10; opacity:.75; }
.wordmark .wm-sub { position:relative; display:inline-block; font-size:10px; font-weight:500; color:#0e0e10; margin-top:10px;
  letter-spacing:.14em; text-transform:uppercase; background:rgba(255,255,255,.6); border:1px solid rgba(255,255,255,.55);
  border-radius:var(--radius-pill); padding:4px 10px; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
.wordmark .wm-sub b { font-weight:600; }
nav.mainnav { padding:2px 10px 8px; display:flex; flex-direction:column; gap:2px; flex:1; overflow:auto; }
.navbtn { display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:none; border:0;

    box.appendChild(tableView(['Bucket', 'Count'], rows.map(function (r) { return [r.bucket, r.count]; })));
  },

  vintages: function (m) {
    var box = clear($('#mn-vintage'));
    box.appendChild(h('h3', { text: 'Vintage FPD by months on book — vs appetite corridor' }));
    var rows = m.vintages || [];
    if (!rows.length) { box.appendChild(h('div', { class: 'small muted', text: 'No vintage data.' })); return; }
    var series = [
      { key: 'retailFpdPct', label: 'Retail', color: 'var(--s1)' },
      { key: 'smeFpdPct', label: 'SME', color: 'var(--s2)' }
    ];
    var W = 440, H = 210, padL = 40, padR = 56, padT = 12, padB = 24;
    var plotW = W - padL - padR, plotH = H - padT - padB;
    var maxV = niceMax(Math.max.apply(null, rows.map(function (r) { return Math.max(r.retailFpdPct || 0, r.smeFpdPct || 0); })) * 1.25);
    var xs = function (i) { return padL + plotW * (rows.length === 1 ? 0.5 : i / (rows.length - 1)); };
    var ys = function (v) { return padT + plotH * (1 - v / maxV); };
    var svg = chartSvg(W, H);
    /* appetite corridor band (illustrative CRO corridor) */
    var corTop = maxV * 0.62, corBot = maxV * 0.18;
    svg.appendChild(S('rect', { x: padL, y: ys(corTop), width: plotW, height: ys(corBot) - ys(corTop), style: 'fill:var(--corridor);' }));
    svg.appendChild(S('text', { x: padL + 4, y: ys(corTop) + 11, text: 'appetite corridor (illustrative)' }));
    for (var g = 0; g <= 2; g++) {
      var gv = maxV * g / 2, gy = ys(gv);
      svg.appendChild(S('line', { x1: padL, x2: W - padR, y1: gy, y2: gy, style: 'stroke:var(--grid);stroke-width:1;' }));
      svg.appendChild(S('text', { x: padL - 6, y: gy + 3.5, 'text-anchor': 'end', class: 'ticknum', text: fmtPct(gv, 1) }));
    }
    var legend = h('div', { class: 'legend' });
    series.forEach(function (sr) {
      legend.appendChild(h('span', { class: 'lg' }, h('span', { class: 'swl', style: 'border-top-color:' + sr.color + ';' }), sr.label + ' FPD'));
      var dPath = rows.map(function (r, i) { return (i ? 'L' : 'M') + xs(i) + ',' + ys(r[sr.key] || 0); }).join(' ');
      svg.appendChild(S('path', { d: dPath, style: 'fill:none;stroke:' + sr.color + ';stroke-width:2;stroke-linejoin:round;stroke-linecap:round;' }));
      rows.forEach(function (r, i) {
        svg.appendChild(S('circle', { cx: xs(i), cy: ys(r[sr.key] || 0), r: 4, style: 'fill:' + sr.color + ';stroke:var(--panel);stroke-width:2;' }));
      });
      var last = rows[rows.length - 1];
      svg.appendChild(S('text', { x: xs(rows.length - 1) + 8, y: ys(last[sr.key] || 0) + 3.5, class: 'dlabel', text: sr.label }));
    });
    rows.forEach(function (r, i) {
      svg.appendChild(S('text', { x: xs(i), y: H - 7, 'text-anchor': 'middle', class: 'ticknum', text: 'M' + (r.mob !== undefined ? r.mob : i + 1) }));
    });
    svg.appendChild(S('line', { x1: padL, x2: W - padR, y1: padT + plotH, y2: padT + plotH, style: 'stroke:var(--axis);stroke-width:1;' }));
    var cbox = h('div', { class: 'chart-box' });
    var tip = makeTip(cbox);
    var cross = S('line', { y1: padT, y2: padT + plotH, style: 'stroke:var(--axis);stroke-width:1;', visibility: 'hidden' });
    svg.appendChild(cross);
    var overlay = S('rect', { x: padL, y: padT, width: plotW, height: plotH, fill: 'transparent' });
    overlay.addEventListener('pointermove', function (ev) {
      var r = cbox.getBoundingClientRect();
      var scale = W / r.width;
      var px = (ev.clientX - r.left) * scale;
      var i = Math.max(0, Math.min(rows.length - 1, Math.round((px - padL) / (plotW / (rows.length - 1)))));
      cross.setAttribute('x1', xs(i)); cross.setAttribute('x2', xs(i));
      cross.setAttribute('visibility', 'visible');
      tip.show('Month on book ' + (rows[i].mob !== undefined ? rows[i].mob : i + 1),
        series.map(function (sr) { return { label: sr.label + ' FPD', value: fmtPct(rows[i][sr.key], 2), color: sr.color }; }),
        ev.clientX - r.left, ev.clientY - r.top);
    });
    overlay.addEventListener('pointerleave', function () { cross.setAttribute('visibility', 'hidden'); tip.hide(); });
    svg.appendChild(overlay);
    cbox.appendChild(svg);
    box.appendChild(legend);
    box.appendChild(cbox);
    box.appendChild(h('div', { class: 'small muted', text: 'First-payment-default by vintage, monitored against the CRO appetite corridor — proves automation is not buying growth with risk. Retail sits comfortably inside; SME rides the upper edge, which is the refer-first launch posture holding.' }));
    box.appendChild(tableView(['MOB', 'Retail FPD %', 'SME FPD %'],
      rows.map(function (r) { return ['M' + r.mob, (r.retailFpdPct !== undefined ? r.retailFpdPct.toFixed(2) : '—'), (r.smeFpdPct !== undefined ? r.smeFpdPct.toFixed(2) : '—')]; })));
  }
};
</script>

<title>Mizan — Credit Decisioning Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* ---------- Design tokens (contract §3) ---------- */
:root {
  color-scheme: light;
  --ground:#F6F8F7; --panel:#FFFFFF; --ink:#182420; --muted:#5A6B64;
  --accent:#0C5D63; --accent-strong:#09454A; --brass:#A87B2F;
  --ok:#1E7F56; --warn:#A9761B; --bad:#AE3B32;
  --ok-soft:rgba(30,127,86,.10); --warn-soft:rgba(169,118,27,.11); --bad-soft:rgba(174,59,50,.10);
  --accent-soft:rgba(12,93,99,.08);
  --hairline:rgba(24,36,32,.14); --hairline-soft:rgba(24,36,32,.08);
  --grid:#E4EAE8; --axis:#C9D3D0;
  /* chart series (validated, dataviz skill): outcome trio + categorical pair + meter track */
  --c-approve:#177C4E; --c-refer:#BC8319; --c-decline:#A32C2C;
  --s1:#0083A0; --s2:#A87B2F; --meter-track:#D5E5EA; --corridor:rgba(12,93,99,.07);
  --font-display:Georgia,'Iowan Old Style','Times New Roman',serif;
  --font-ui:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --font-mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --font-ar:'Noto Naskh Arabic','Geeza Pro','Traditional Arabic',serif;
  --shadow:0 1px 2px rgba(24,36,32,.05), 0 4px 14px rgba(24,36,32,.05);
  --radius:10px;
}
@media (prefers-color-scheme: dark) {
  :root:where(:not([data-theme="light"])) {
    color-scheme: dark;
    --ground:#0F1514; --panel:#161D1B; --ink:#E4EBE8; --muted:#93A39D;
    --accent:#4FB3B9; --accent-strong:#7ACBD0; --brass:#C9A05E;
    --ok:#4CC08A; --warn:#D9A94E; --bad:#E07B70;
    --ok-soft:rgba(76,192,138,.13); --warn-soft:rgba(217,169,78,.13); --bad-soft:rgba(224,123,112,.13);
    --accent-soft:rgba(79,179,185,.12);
    --hairline:rgba(228,235,232,.16); --hairline-soft:rgba(228,235,232,.09);
    --grid:#232D2A; --axis:#33403C;
    --c-approve:#35A873; --c-refer:#BA8A15; --c-decline:#D0473E;
    --s1:#17A3B4; --s2:#B08034; --meter-track:#173237; --corridor:rgba(79,179,185,.08);
    --shadow:0 1px 2px rgba(0,0,0,.25), 0 4px 14px rgba(0,0,0,.22);
  }
}
:root[data-theme="dark"] {
  color-scheme: dark;
  --ground:#0F1514; --panel:#161D1B; --ink:#E4EBE8; --muted:#93A39D;
  --accent:#4FB3B9; --accent-strong:#7ACBD0; --brass:#C9A05E;
  --ok:#4CC08A; --warn:#D9A94E; --bad:#E07B70;
  --ok-soft:rgba(76,192,138,.13); --warn-soft:rgba(217,169,78,.13); --bad-soft:rgba(224,123,112,.13);
  --accent-soft:rgba(79,179,185,.12);
  --hairline:rgba(228,235,232,.16); --hairline-soft:rgba(228,235,232,.09);
  --grid:#232D2A; --axis:#33403C;
  --c-approve:#35A873; --c-refer:#BA8A15; --c-decline:#D0473E;
  --s1:#17A3B4; --s2:#B08034; --meter-track:#173237; --corridor:rgba(79,179,185,.08);
  --shadow:0 1px 2px rgba(0,0,0,.25), 0 4px 14px rgba(0,0,0,.22);
}

/* ---------- Base ---------- */
* { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body { background:var(--ground); color:var(--ink); font:14px/1.5 var(--font-ui); -webkit-font-smoothing:antialiased; }
h1,h2,h3,h4 { margin:0; font-weight:600; }
p { margin:.4em 0; }
a { color:var(--accent); }
button { font:inherit; color:inherit; }
code, .mono { font-family:var(--font-mono); font-size:.92em; }
:focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:3px; }
.ar { font-family:var(--font-ar); direction:rtl; unicode-bidi:isolate; }
.num { font-family:var(--font-mono); font-variant-numeric:tabular-nums; }
.muted { color:var(--muted); }
.small { font-size:12px; }
hr.rule { border:0; border-top:1px solid var(--hairline-soft); margin:14px 0; }

/* ---------- Fatal banner ---------- */
#fatal-banner { display:none; position:sticky; top:0; z-index:99; background:var(--bad); color:#fff;
  padding:10px 16px; font-family:var(--font-mono); font-size:12.5px; white-space:pre-wrap; }
#fatal-banner.show { display:block; }

/* ---------- Layout ---------- */
.app { display:flex; min-height:100vh; }
.sidebar { width:236px; flex:0 0 236px; background:var(--panel); border-right:1px solid var(--hairline-soft);
  display:flex; flex-direction:column; position:sticky; top:0; height:100vh; }
.wordmark { padding:20px 20px 14px; border-bottom:1px solid var(--hairline-soft); }
.wordmark .wm-line { display:flex; align-items:baseline; gap:8px; }
.wordmark .wm-en { font-family:var(--font-display); font-size:24px; letter-spacing:.01em; }
.wordmark .wm-ar { font-family:var(--font-ar); font-size:19px; color:var(--brass); }
.wordmark .wm-sub { font-size:11px; color:var(--muted); margin-top:3px; letter-spacing:.02em; }
nav.mainnav { padding:10px 8px; display:flex; flex-direction:column; gap:2px; flex:1; overflow:auto; }
.navbtn { display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:none; border:0;
  border-radius:8px; padding:8px 12px; cursor:pointer; color:var(--ink); font-size:13.5px; }
.navbtn svg { flex:0 0 16px; opacity:.75; }
.navbtn:hover { background:var(--accent-soft); }
.navbtn.active { background:var(--accent); color:#fff; }
.navbtn.active svg { opacity:1; }
.navbtn .nsub { display:block; font-size:10.5px; color:var(--muted); font-weight:400; }
.navbtn.active .nsub { color:rgba(255,255,255,.75); }
.sidefoot { padding:12px 14px 14px; border-top:1px solid var(--hairline-soft); display:flex; flex-direction:column; gap:8px; }
.synthetic-badge { font-size:10.5px; line-height:1.45; color:var(--warn); background:var(--warn-soft);
  border:1px solid var(--warn); border-radius:7px; padding:6px 8px; }
.versions { font-size:10.5px; color:var(--muted); font-family:var(--font-mono); }
.theme-btn { display:flex; align-items:center; gap:8px; background:none; border:1px solid var(--hairline);
  border-radius:8px; padding:6px 10px; cursor:pointer; font-size:12px; color:var(--muted); }
.theme-btn:hover { color:var(--ink); border-color:var(--muted); }

main.content { flex:1; min-width:0; padding:26px 34px 60px; max-width:1280px; }
section[data-screen] { display:none; }
section[data-screen].active { display:block; }
.screen-head { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap; }
.screen-head h1 { font-family:var(--font-display); font-size:26px; font-weight:600; }
.screen-head .sub { color:var(--muted); font-size:13px; margin-top:4px; max-width:760px; }
.screen-head .eyebrow { font-size:11px; letter-spacing:.09em; text-transform:uppercase; color:var(--brass); margin-bottom:2px; }
.chip-synth { flex:0 0 auto; font-size:10.5px; color:var(--warn); border:1px solid var(--warn); border-radius:99px;
  padding:3px 10px; background:var(--warn-soft); white-space:nowrap; margin-top:6px; }

/* ---------- Panels & grids ---------- */
.panel { background:var(--panel); border:1px solid var(--hairline-soft); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:16px 18px; }
.panel + .panel { margin-top:14px; }
.panel h3 { font-size:13px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; font-weight:600; }
.panel h3 .h3-note { text-transform:none; letter-spacing:0; font-weight:400; }
.grid2 { display:grid; grid-template-columns:minmax(340px,5fr) minmax(380px,6fr); gap:14px; align-items:start; }
.grid-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(205px,1fr)); gap:10px; }
@media (max-width:1100px) { .grid2 { grid-template-columns:1fr; } }

/* ---------- Buttons ---------- */
.btn { background:var(--panel); border:1px solid var(--hairline); border-radius:8px; padding:7px 14px;
  cursor:pointer; font-size:13px; }
.btn:hover { border-color:var(--accent); color:var(--accent); }
.btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
.btn-primary:hover { background:var(--accent-strong); border-color:var(--accent-strong); color:#fff; }
.btn-ghost { border-color:transparent; color:var(--muted); }
.btn-ghost:hover { color:var(--accent); border-color:transparent; }
.btn[disabled] { opacity:.5; cursor:not-allowed; }
.btnrow { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

/* ---------- Chips / outcome badges ---------- */
.chip { display:inline-flex; align-items:center; gap:5px; border-radius:99px; padding:2px 9px; font-size:11px;
  border:1px solid var(--hairline); color:var(--muted); background:transparent; white-space:nowrap; }
.chip.acc { color:var(--accent); border-color:var(--accent); background:var(--accent-soft); }
.oc { display:inline-flex; align-items:center; gap:6px; font-weight:700; border-radius:6px; padding:2px 9px; font-size:11.5px; letter-spacing:.03em; }
.oc-APPROVE { color:var(--ok); background:var(--ok-soft); border:1px solid var(--ok); }
.oc-REFER { color:var(--warn); background:var(--warn-soft); border:1px solid var(--warn); }
.oc-DECLINE { color:var(--bad); background:var(--bad-soft); border:1px solid var(--bad); }
.res-PASS { color:var(--ok); } .res-FAIL { color:var(--bad); } .res-REFER { color:var(--warn); }
.grade-chip { display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:26px;
  border-radius:7px; font-weight:700; font-size:14px; background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent); }

/* ---------- Outcome banner ---------- */
.outcome-banner { border-radius:var(--radius); padding:14px 16px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; border:1px solid; }
.outcome-banner.APPROVE { background:var(--ok-soft); border-color:var(--ok); }
.outcome-banner.REFER { background:var(--warn-soft); border-color:var(--warn); }
.outcome-banner.DECLINE { background:var(--bad-soft); border-color:var(--bad); }
.outcome-banner .ob-word { font-family:var(--font-display); font-size:22px; font-weight:700; }
.outcome-banner.APPROVE .ob-word { color:var(--ok); }
.outcome-banner.REFER .ob-word { color:var(--warn); }
.outcome-banner.DECLINE .ob-word { color:var(--bad); }
.outcome-banner .ob-meta { font-size:12px; color:var(--muted); }

/* ---------- Forms ---------- */
.field { margin-bottom:12px; }
.field label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
.field input[type=number], .field input[type=text], .field select, .field textarea {
  width:100%; background:var(--ground); color:var(--ink); border:1px solid var(--hairline);
  border-radius:7px; padding:7px 9px; font:13px var(--font-ui); }
.field input[type=range] { width:100%; accent-color:var(--accent); }
.field .bounds { font-size:10.5px; color:var(--muted); }
.slider-row { display:grid; grid-template-columns:1fr 110px; gap:10px; align-items:center; }
.consent-box { border:1px solid var(--hairline); border-radius:8px; padding:10px 12px; margin-bottom:8px; display:flex; gap:10px; align-items:flex-start; }
.consent-box input[type=checkbox] { margin-top:3px; accent-color:var(--accent); width:15px; height:15px; }
.consent-box .cb-title { font-weight:600; font-size:13px; }
.consent-box .cb-legal { font-size:11.5px; color:var(--muted); margin-top:2px; }
.callout { border-radius:8px; padding:10px 12px; font-size:12.5px; border:1px solid; margin-top:10px; }
.callout-error { border-color:var(--bad); background:var(--bad-soft); color:var(--bad); }
.callout-warn { border-color:var(--warn); background:var(--warn-soft); }
.callout-info { border-color:var(--accent); background:var(--accent-soft); }
.callout-ok { border-color:var(--ok); background:var(--ok-soft); }
.callout .co-title { font-weight:700; margin-bottom:2px; }
.callout .co-body { color:var(--ink); }

/* ---------- Persona cards ---------- */
.pcard { text-align:left; background:var(--panel); border:1px solid var(--hairline); border-radius:10px;
  padding:11px 12px; cursor:pointer; display:flex; flex-direction:column; gap:5px; }
.pcard:hover { border-color:var(--accent); }
.pcard.sel { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; background:var(--accent-soft); }
.pcard .pname { font-weight:600; font-size:13.5px; display:flex; justify-content:space-between; gap:8px; align-items:baseline; }
.pcard .pname .ar { font-size:12.5px; color:var(--muted); font-weight:400; }
.pcard .ptag { font-size:11.5px; color:var(--muted); line-height:1.35; }
.pcard .pchips { display:flex; flex-wrap:wrap; gap:4px; margin-top:2px; }

/* ---------- Orchestration timeline ---------- */
.timeline { display:flex; flex-direction:column; gap:0; }
.t-step { display:flex; gap:12px; padding:7px 0; border-bottom:1px solid var(--hairline-soft); align-items:flex-start; opacity:1; }
.t-step:last-child { border-bottom:0; }
.t-step.pending { opacity:.25; }
.t-step .t-dot { flex:0 0 10px; width:10px; height:10px; border-radius:50%; background:var(--accent); margin-top:5px; }
.t-step.pending .t-dot { background:var(--muted); }
.t-step .t-main { flex:1; min-width:0; }
.t-step .t-title { font-size:13px; font-weight:600; }
.t-step .t-sum { font-size:11.5px; color:var(--muted); font-family:var(--font-mono); overflow-wrap:anywhere; }
.t-step .t-lat { flex:0 0 auto; font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-size:11.5px; color:var(--muted); margin-top:3px; }

/* ---------- KV + tables ---------- */
.kv { display:grid; grid-template-columns:auto 1fr; gap:3px 16px; font-size:12.5px; }
.kv dt { color:var(--muted); } .kv dd { margin:0; }
.tbl { width:100%; border-collapse:collapse; font-size:12.5px; }
.tbl th { text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted);
  border-bottom:1px solid var(--hairline); padding:5px 8px; font-weight:600; }
.tbl td { padding:6px 8px; border-bottom:1px solid var(--hairline-soft); vertical-align:top; }
.tbl tr:last-child td { border-bottom:0; }
.tbl td.num, .tbl th.num { text-align:right; font-family:var(--font-mono); font-variant-numeric:tabular-nums; }
.tbl tbody tr.rowbtn { cursor:pointer; }
.tbl tbody tr.rowbtn:hover td { background:var(--accent-soft); }
.tbl tbody tr.sel td { background:var(--accent-soft); }
.tbl-scroll { overflow-x:auto; }

/* ---------- Murabaha steps ---------- */
.exec-steps { display:flex; flex-direction:column; gap:6px; }
.estep { display:flex; align-items:center; gap:10px; border:1px solid var(--hairline); border-radius:8px; padding:8px 10px;
  background:var(--panel); cursor:pointer; text-align:left; width:100%; }
.estep:hover { border-color:var(--accent); }
.estep.done { border-color:var(--ok); background:var(--ok-soft); cursor:default; }
.estep .es-n { flex:0 0 22px; width:22px; height:22px; border-radius:50%; border:1px solid var(--hairline);
  display:flex; align-items:center; justify-content:center; font-size:11px; font-family:var(--font-mono); }
.estep.done .es-n { background:var(--ok); border-color:var(--ok); color:#fff; }
.estep .es-t { font-weight:600; font-size:12.5px; }
.estep .es-d { font-size:11px; color:var(--muted); }
.estep .es-at { margin-left:auto; font-family:var(--font-mono); font-size:10.5px; color:var(--ok); }

/* ---------- Limit trace ---------- */
.trace { display:flex; flex-direction:column; gap:4px; }
.trace-row { display:flex; justify-content:space-between; gap:10px; font-size:12.5px; padding:4px 8px; border-radius:6px; }
.trace-row .tval { font-family:var(--font-mono); font-variant-numeric:tabular-nums; }
.trace-row.binding { background:var(--accent-soft); border:1px solid var(--accent); font-weight:600; }

/* ---------- Meters, tiles ---------- */
.tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:14px; }
.tile { background:var(--panel); border:1px solid var(--hairline-soft); border-radius:var(--radius); box-shadow:var(--shadow); padding:13px 15px; }
.tile .t-label { font-size:11.5px; color:var(--muted); }
.tile .t-value { font-size:27px; font-weight:650; font-family:var(--font-mono); font-variant-numeric:tabular-nums; margin:2px 0 1px; }
.tile .t-delta { font-size:11.5px; display:flex; align-items:center; gap:4px; }
.tile .t-delta.good { color:var(--ok); } .tile .t-delta.bad { color:var(--bad); }
.meter { position:relative; height:8px; border-radius:5px; background:var(--meter-track); margin-top:8px; }
.meter .m-fill { position:absolute; inset:0 auto 0 0; border-radius:5px; background:var(--s1); }
.meter .m-target { position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--ink); opacity:.55; }
.meter-cap { display:flex; justify-content:space-between; font-size:10.5px; color:var(--muted); margin-top:3px; }

/* ---------- Charts ---------- */
.chart-box { position:relative; }
.chart-box svg { display:block; width:100%; height:auto; }
.chart-box svg text { font-family:var(--font-ui); font-size:10.5px; fill:var(--muted); }
.chart-box svg .ticknum { font-family:var(--font-mono); font-variant-numeric:tabular-nums; }
.chart-box svg .dlabel { fill:var(--ink); font-weight:600; }
.viz-tip { position:absolute; pointer-events:none; background:var(--panel); border:1px solid var(--hairline);
  border-radius:7px; box-shadow:var(--shadow); padding:7px 10px; font-size:11.5px; display:none; z-index:5; min-width:120px; }
.viz-tip .vt-title { color:var(--muted); font-size:10.5px; margin-bottom:3px; }
.viz-tip .vt-row { display:flex; align-items:center; gap:6px; }
.viz-tip .vt-key { width:10px; height:0; border-top:3px solid; border-radius:2px; }
.viz-tip .vt-val { font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-weight:600; margin-left:auto; padding-left:10px; }
.legend { display:flex; gap:14px; flex-wrap:wrap; font-size:11.5px; color:var(--muted); margin:4px 0 2px; }
.legend .lg { display:inline-flex; align-items:center; gap:6px; }
.legend .sw { width:10px; height:10px; border-radius:3px; display:inline-block; }
.legend .swl { width:12px; height:0; border-top:3px solid; border-radius:2px; display:inline-block; }
details.tbl-view { margin-top:8px; }
details.tbl-view summary { cursor:pointer; font-size:11.5px; color:var(--muted); }
details.tbl-view table { margin-top:6px; }
.callouts-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }

/* ---------- Policy console ---------- */
.lockrow td:first-child { white-space:nowrap; }
.lock-ico { color:var(--brass); margin-right:6px; }
.param-changed { color:var(--accent); font-weight:700; }
.diff-chip { font-family:var(--font-mono); font-size:11px; background:var(--accent-soft); border-radius:5px; padding:1px 6px; }

/* ---------- Overview ---------- */
.pos-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:10px; }
.pos { border:1px solid var(--hairline-soft); border-left:3px solid var(--brass); border-radius:8px; padding:10px 12px; background:var(--panel); }
.pos .p-n { font-family:var(--font-display); color:var(--brass); font-size:15px; }
.pos .p-t { font-weight:650; font-size:13px; margin:2px 0; }
.pos .p-d { font-size:12px; color:var(--muted); }
.demo-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:8px; }
.demo-step { border:1px solid var(--hairline); border-radius:8px; padding:9px 11px; background:var(--panel); text-align:left; cursor:pointer; }
.demo-step:hover { border-color:var(--accent); }
.demo-step .d-n { font-family:var(--font-mono); font-size:10.5px; color:var(--brass); }
.demo-step .d-t { font-weight:600; font-size:12.5px; }
.demo-step .d-d { font-size:11px; color:var(--muted); }

/* ---------- Boot error ---------- */
#boot-error { display:none; margin:40px auto; max-width:640px; }
#boot-error.show { display:block; }

/* ---------- Responsive: sidebar -> tab bar ---------- */
@media (max-width:900px) {
  .app { flex-direction:column; }
  .sidebar { width:100%; flex:none; height:auto; position:sticky; top:0; z-index:20; flex-direction:column; border-right:0; border-bottom:1px solid var(--hairline-soft); }
  nav.mainnav { flex-direction:row; overflow-x:auto; padding:6px 8px; }
  .navbtn { white-space:nowrap; }
  .navbtn .nsub { display:none; }
  .wordmark { padding:12px 16px 8px; border-bottom:0; }
  .sidefoot { flex-direction:row; align-items:center; justify-content:space-between; padding:6px 12px; }
  .versions { display:none; }
  main.content { padding:18px 16px 50px; }
}

/* ---------- Motion ---------- */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation:none !important; transition:none !important; }
}
</style>

}

function pullsTimeline(rec, opts) {

    var sumParts = [];

    if (p.summary) { for (var k in p.summary) sumParts.push(k + ': ' + p.summary[k]); }
    steps.push({ title: PULL_LABEL[p.source] || p.source, sum: sumParts.join(' · '), lat: p.latencyMs });
  });
  steps.push({ title: 'Policy pack + scorecard + limit engine', sum: 'rules evaluated · grade assigned · limit derived', lat: null });

  var tl = h('div', { class: 'timeline' });
  var rows = steps.map(function (s) {
    return h('div', { class: 't-step pending' },
      h('span', { class: 't-dot', 'aria-hidden': 'true' }),
      h('div', { class: 't-main' }, h('div', { class: 't-title', text: s.title }), s.sum ? h('div', { class: 't-sum', text: s.sum }) : null),
      s.lat !== null && s.lat !== undefined ? h('span', { class: 't-lat', text: fmtN(s.lat) + ' ms' }) : null);
  });

  var skip = h('button', { class: 'btn btn-ghost small', text: 'Skip animation', 'aria-label': 'Skip orchestration animation' });
  var head = h('div', { style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;' },
    h('strong', { class: 'small', text: 'Orchestration — data acquisition' }), skip);

  var timer = null, idx = 0, done = false;
  function reveal(i) { if (rows[i]) rows[i].classList.remove('pending'); }
  function finish() {
    if (done) return; done = true;

}

    svg.appendChild(S('line', { x1: padL, x2: W - padR, y1: padT + plotH, y2: padT + plotH, style: 'stroke:var(--axis);stroke-width:1;' }));
    box.appendChild(h('div', { class: 'chart-box' }, svg));
    box.appendChild(h('div', { class: 'small muted', text: 'D is reachable only via override; E auto-fails — the tail you see is the override loop working.' }));
    box.appendChild(tableView(['Grade', 'Count'], rows.map(function (r) { return [r.grade, r.count]; })));
  },

  aging: function (m) {
    var box = clear($('#mn-aging'));
    box.appendChild(h('h3', { text: 'Refer aging — open cases vs SLA' }));
    var rows = m.referAging || [];
    if (!rows.length) { box.appendChild(h('div', { class: 'small muted', text: 'No open refers.' })); return; }
    var W = 440, H = 190, padL = 40, padR = 10, padT = 16, padB = 24;
    var plotW = W - padL - padR, plotH = H - padT - padB;
    var maxC = niceMax(Math.max.apply(null, rows.map(function (r) { return r.count; })));
    var svg = chartSvg(W, H);
    for (var g = 0; g <= 2; g++) {
      var gy = padT + plotH * (1 - g / 2);
      svg.appendChild(S('line', { x1: padL, x2: W - padR, y1: gy, y2: gy, style: 'stroke:var(--grid);stroke-width:1;' }));
      svg.appendChild(S('text', { x: padL - 6, y: gy + 3.5, 'text-anchor': 'end', class: 'ticknum', text: String(Math.round(maxC * g / 2)) }));
    }
    var band = plotW / rows.length, barW = Math.min(24, band - 30);
    rows.forEach(function (r, i) {
      var x = padL + band * i + (band - barW) / 2;
      var hh = plotH * r.count / maxC;
      svg.appendChild(S('path', { d: roundTopRect(x, padT + plotH - hh, barW, hh, 4), style: 'fill:var(--s1);' }));
      svg.appendChild(S('text', { x: x + barW / 2, y: padT + plotH - hh - 5, 'text-anchor': 'middle', class: 'dlabel ticknum', text: String(r.count) }));
      svg.appendChild(S('text', { x: padL + band * i + band / 2, y: H - 7, 'text-anchor': 'middle', text: r.bucket + (r.bucket === '>24h' ? ' — SLA breach' : '') }));
    });
    svg.appendChild(S('line', { x1: padL, x2: W - padR, y1: padT + plotH, y2: padT + plotH, style: 'stroke:var(--axis);stroke-width:1;' }));
    box.appendChild(h('div', { class: 'chart-box' }, svg));
    box.appendChild(h('div', { class: 'small muted', text: 'SME target: refer resolution < 24h at launch, < 1h by M14.' }));
    box.appendChild(tableView(['Bucket', 'Count'], rows.map(function (r) { return [r.bucket, r.count]; })));
  },

  vintages: function (m) {
    var box = clear($('#mn-vintage'));
    box.appendChild(h('h3', { text: 'Vintage FPD by months on book — vs appetite corridor' }));
    var rows = m.vintages || [];
    if (!rows.length) { box.appendChild(h('div', { class: 'small muted', text: 'No vintage data.' })); return; }
    var series = [
      { key: 'retailFpdPct', label: 'Retail', color: 'var(--s1)' },
      { key: 'smeFpdPct', label: 'SME', color: 'var(--s2)' }
    ];
    var W = 440, H = 210, padL = 40, padR = 56, padT = 12, padB = 24;
    var plotW = W - padL - padR, plotH = H - padT - padB;
    var maxV = niceMax(Math.max.apply(null, rows.map(function (r) { return Math.max(r.retailFpdPct || 0, r.smeFpdPct || 0); })) * 1.25);
    var xs = function (i) { return padL + plotW * (rows.length === 1 ? 0.5 : i / (rows.length - 1)); };
    var ys = function (v) { return padT + plotH * (1 - v / maxV); };
    var svg = chartSvg(W, H);
    /* appetite corridor band (illustrative CRO corridor) */
    var corTop = maxV * 0.62, corBot = maxV * 0.18;
    svg.appendChild(S('rect', { x: padL, y: ys(corTop), width: plotW, height: ys(corBot) - ys(corTop), style: 'fill:var(--corridor);' }));
    svg.appendChild(S('text', { x: padL + 4, y: ys(corTop) + 11, text: 'appetite corridor (illustrative)' }));
    for (var g = 0; g <= 2; g++) {
      var gv = maxV * g / 2, gy = ys(gv);
      svg.appendChild(S('line', { x1: padL, x2: W - padR, y1: gy, y2: gy, style: 'stroke:var(--grid);stroke-width:1;' }));
      svg.appendChild(S('text', { x: padL - 6, y: gy + 3.5, 'text-anchor': 'end', class: 'ticknum', text: fmtPct(gv, 1) }));
    }
    var legend = h('div', { class: 'legend' });
    series.forEach(function (sr) {
      legend.appendChild(h('span', { class: 'lg' }, h('span', { class: 'swl', style: 'border-top-color:' + sr.color + ';' }), sr.label + ' FPD'));
      var dPath = rows.map(function (r, i) { return (i ? 'L' : 'M') + xs(i) + ',' + ys(r[sr.key] || 0); }).join(' ');
      svg.appendChild(S('path', { d: dPath, style: 'fill:none;stroke:' + sr.color + ';stroke-width:2;stroke-linejoin:round;stroke-linecap:round;' }));
      rows.forEach(function (r, i) {
        svg.appendChild(S('circle', { cx: xs(i), cy: ys(r[sr.key] || 0), r: 4, style: 'fill:' + sr.color + ';stroke:var(--panel);stroke-width:2;' }));
      });
      var last = rows[rows.length - 1];
      svg.appendChild(S('text', { x: xs(rows.length - 1) + 8, y: ys(last[sr.key] || 0) + 3.5, class: 'dlabel', text: sr.label }));
    });
    rows.forEach(function (r, i) {
      svg.appendChild(S('text', { x: xs(i), y: H - 7, 'text-anchor': 'middle', class: 'ticknum', text: 'M' + (r.mob !== undefined ? r.mob : i + 1) }));
    });
    svg.appendChild(S('line', { x1: padL, x2: W - padR, y1: padT + plotH, y2: padT + plotH, style: 'stroke:var(--axis);stroke-width:1;' }));
    var cbox = h('div', { class: 'chart-box' });
    var tip = makeTip(cbox);
    var cross = S('line', { y1: padT, y2: padT + plotH, style: 'stroke:var(--axis);stroke-width:1;', visibility: 'hidden' });
    svg.appendChild(cross);
    var overlay = S('rect', { x: padL, y: padT, width: plotW, height: plotH, fill: 'transparent' });
    overlay.addEventListener('pointermove', function (ev) {
      var r = cbox.getBoundingClientRect();
      var scale = W / r.width;
      var px = (ev.clientX - r.left) * scale;
      var i = Math.max(0, Math.min(rows.length - 1, Math.round((px - padL) / (plotW / (rows.length - 1)))));
      cross.setAttribute('x1', xs(i)); cross.setAttribute('x2', xs(i));
      cross.setAttribute('visibility', 'visible');
      tip.show('Month on book ' + (rows[i].mob !== undefined ? rows[i].mob : i + 1),
        series.map(function (sr) { return { label: sr.label + ' FPD', value: fmtPct(rows[i][sr.key], 2), color: sr.color }; }),
        ev.clientX - r.left, ev.clientY - r.top);
    });
    overlay.addEventListener('pointerleave', function () { cross.setAttribute('visibility', 'hidden'); tip.hide(); });
    svg.appendChild(overlay);
    cbox.appendChild(svg);
    box.appendChild(legend);
    box.appendChild(cbox);
    box.appendChild(h('div', { class: 'small muted', text: 'First-payment-default by vintage, monitored against the CRO appetite corridor — proves automation is not buying growth with risk. Retail sits comfortably inside; SME rides the upper edge, which is the refer-first launch posture holding.' }));
    box.appendChild(tableView(['MOB', 'Retail FPD %', 'SME FPD %'],
      rows.map(function (r) { return ['M' + r.mob, (r.retailFpdPct !== undefined ? r.retailFpdPct.toFixed(2) : '—'), (r.smeFpdPct !== undefined ? r.smeFpdPct.toFixed(2) : '—')]; })));
  }
};
</script>
